version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    pre_build:
      - if [ "$READTHEDOCS_VERSION_TYPE" = "tag" ] && ! echo "$READTHEDOCS_VERSION" | grep -Eq "^v?[0-9]+\.0\.0$"; then exit 183; fi

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: requirements.txt